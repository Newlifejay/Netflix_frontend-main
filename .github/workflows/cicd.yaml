name: Build and Push Frontend Image

on:
  push:
    branches: [ "main" ]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build Docker image
      - name: Build Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/netflix_frontend-main:latest .

      # 4. Push image
      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/netflix_frontend:${GITHUB_RUN_NUMBER}