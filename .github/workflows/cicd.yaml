name: Build and Push Frontend Image

on:
  push:
    branches: [ "main" ]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      - name: configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY}}
            aws-region: ${{ secrets.AWS_REGION }}

    #Login to ECR  
    #==============
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 3. Build Docker image
      - name: Build Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/netflix_frontend:${GITHUB_RUN_NUMBER} .

      # 4. Push image
 
      - name: Docker push
        run: |
          docker tag netflix_frontend:latest 863355751988.dkr.ecr.us-east-2.amazonaws.com/netflix_frontend:${GITHUB_RUN_NUMBER}
          docker push 863355751988.dkr.ecr.us-east-2.amazonaws.com/netflix_frontend:${GITHUB_RUN_NUMBER}
